services:
  ppe-detection:
    build: .
    container_name: ppe-detection-system
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./weights:/app/weights
      - ./data:/app/data
      - ./outputs:/app/outputs
      - ./logs:/app/logs
    restart: unless-stopped
